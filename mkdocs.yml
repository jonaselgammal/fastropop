site_name: fastropop
site_description: Semi-analytic SMBHB population synthesis in JAX
site_url: https://fastropop.readthedocs.io/
repo_url: https://github.com/jonaselgammal/fastropop
repo_name: jonaselgammal/fastropop

theme:
  name: material
  logo: img/fastropop-emblem-transparent.png
  favicon: img/favicon.png
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            docstring_section_style: list
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Semi-Analytic Model: semi-analytic-model.md
  - API:
      - Semi-Analytic Model: api/semi-analytic.md
      - Sampling and Spectra: api/spectra.md
      - Cosmology: api/cosmology.md
      - Units: api/units.md
      - Plotting: api/plotting.md
